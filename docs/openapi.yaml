openapi: 3.0.3
info:
  title: Movie Ticket Booking System API
  description: |
    A comprehensive REST API for managing movie ticket bookings, theatres, shows, and user authentication.

    This API provides:
    - User authentication and authorization
    - Movie and theatre management
    - Show scheduling and seat management
    - Transaction-safe booking system with stored procedures
    - Comprehensive error handling and validation

    **Key Features:**
    - JWT-based authentication
    - Role-based access control (USER, ADMIN)
    - Real-time seat availability
    - Secure payment processing
    - Database-first architecture with MySQL
  version: 1.0.0
  contact:
    name: Movie Booking System Support
    email: support@moviebooking.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:5000/api
    description: Development server
  - url: https://api.moviebooking.com/api
    description: Production server

paths:
  # Authentication Endpoints
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Create a new user account with username, email, and password
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistration'
            example:
              username: "john_doe"
              email: "john@example.com"
              password: "SecurePass123"
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login user
      description: Authenticate user with email and password, returns JWT token
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
            example:
              email: "john@example.com"
              password: "SecurePass123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  # Movie Endpoints
  /movies:
    get:
      tags:
        - Movies
      summary: List movies
      description: Retrieve a paginated list of movies with optional filtering
      operationId: getMovies
      parameters:
        - $ref: '#/components/parameters/GenreFilter'
        - $ref: '#/components/parameters/LanguageFilter'
        - $ref: '#/components/parameters/RatingFilter'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Movies retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MoviesResponse'

    post:
      tags:
        - Movies
      summary: Create movie (Admin only)
      description: Create a new movie entry
      operationId: createMovie
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovieInput'
      responses:
        '201':
          description: Movie created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /movies/search:
    get:
      tags:
        - Movies
      summary: Search movies
      description: Search movies by title, description, or other criteria
      operationId: searchMovies
      parameters:
        - name: q
          in: query
          required: true
          description: Search query
          schema:
            type: string
            minLength: 1
            maxLength: 100
          example: "batman"
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MoviesResponse'

  /movies/{id}:
    get:
      tags:
        - Movies
      summary: Get movie details
      description: Retrieve detailed information about a specific movie
      operationId: getMovie
      parameters:
        - $ref: '#/components/parameters/MovieId'
      responses:
        '200':
          description: Movie details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Movies
      summary: Update movie (Admin only)
      description: Update an existing movie
      operationId: updateMovie
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MovieId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovieInput'
      responses:
        '200':
          description: Movie updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Movies
      summary: Delete movie (Admin only)
      description: Soft delete a movie (sets is_active to false)
      operationId: deleteMovie
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MovieId'
      responses:
        '200':
          description: Movie deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # Theatre Endpoints
  /theatres:
    get:
      tags:
        - Theatres
      summary: List theatres
      description: Retrieve a list of all active theatres
      operationId: getTheatres
      responses:
        '200':
          description: Theatres retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TheatresResponse'

    post:
      tags:
        - Theatres
      summary: Create theatre (Admin only)
      description: Create a new theatre
      operationId: createTheatre
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TheatreInput'
      responses:
        '201':
          description: Theatre created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TheatreResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /theatres/{id}:
    get:
      tags:
        - Theatres
      summary: Get theatre details
      description: Retrieve detailed information about a theatre including screens
      operationId: getTheatre
      parameters:
        - $ref: '#/components/parameters/TheatreId'
      responses:
        '200':
          description: Theatre details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TheatreDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # Show Endpoints
  /shows:
    get:
      tags:
        - Shows
      summary: List shows
      description: Retrieve shows with optional filtering by movie, theatre, or date
      operationId: getShows
      parameters:
        - name: movieId
          in: query
          description: Filter by movie ID
          schema:
            type: integer
            minimum: 1
        - name: theatreId
          in: query
          description: Filter by theatre ID
          schema:
            type: integer
            minimum: 1
        - name: date
          in: query
          description: Filter by specific date
          schema:
            type: string
            format: date
        - name: startDate
          in: query
          description: Filter from start date
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          description: Filter to end date
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Shows retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowsResponse'

    post:
      tags:
        - Shows
      summary: Create show (Admin only)
      description: Create a new show
      operationId: createShow
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShowInput'
      responses:
        '201':
          description: Show created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /shows/upcoming:
    get:
      tags:
        - Shows
      summary: Get upcoming shows
      description: Retrieve upcoming shows for the next few days
      operationId: getUpcomingShows
      parameters:
        - name: days
          in: query
          description: Number of days to look ahead (1-90)
          schema:
            type: integer
            minimum: 1
            maximum: 90
            default: 7
      responses:
        '200':
          description: Upcoming shows retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowsResponse'

  /shows/{id}:
    get:
      tags:
        - Shows
      summary: Get show details
      description: Retrieve detailed information about a specific show
      operationId: getShow
      parameters:
        - $ref: '#/components/parameters/ShowId'
      responses:
        '200':
          description: Show details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /shows/{id}/seats:
    get:
      tags:
        - Shows
      summary: Get available seats
      description: |
        Retrieve seat availability for a specific show.
        This endpoint calls a stored procedure for real-time accuracy.
      operationId: getAvailableSeats
      parameters:
        - $ref: '#/components/parameters/ShowId'
      responses:
        '200':
          description: Seat availability retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeatAvailabilityResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # Booking Endpoints (CRITICAL)
  /bookings:
    get:
      tags:
        - Bookings
      summary: List all bookings (Admin only)
      description: Retrieve all bookings in the system with filtering options
      operationId: getAllBookings
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          description: Filter by user ID
          schema:
            type: integer
            minimum: 1
        - name: status
          in: query
          description: Filter by booking status
          schema:
            $ref: '#/components/schemas/BookingStatus'
        - name: dateFrom
          in: query
          description: Start date filter
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          description: End date filter
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/Page'
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 50
      responses:
        '200':
          description: Bookings retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags:
        - Bookings
      summary: Create booking (CRITICAL)
      description: |
        Create a new ticket booking. This is the most critical endpoint that:
        - Uses stored procedures for transaction safety
        - Implements seat locking to prevent double booking
        - Calculates amount server-side for security
        - Processes payment in the same transaction
      operationId: createBooking
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingInput'
            example:
              showId: 1
              seatIds: [1, 2, 3]
              paymentMethod: "CREDIT_CARD"
      responses:
        '201':
          description: Booking created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  code: "VALIDATION_ERROR"
                  message: "Invalid seat selection"
                  details: ["Seat A1 is not valid for this show"]
                  path: "/api/bookings"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Booking conflict (seats already booked)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  code: "BOOKING_CONFLICT"
                  message: "One or more seats are already booked"
                  details: ["Seat A1 is already booked", "Seat A2 is already booked"]
                  path: "/api/bookings"
        '422':
          description: Payment processing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /bookings/my-bookings:
    get:
      tags:
        - Bookings
      summary: Get user's bookings
      description: Retrieve bookings for the authenticated user
      operationId: getUserBookings
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          description: Filter by booking status
          schema:
            $ref: '#/components/schemas/BookingStatus'
        - $ref: '#/components/parameters/Page'
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        '200':
          description: User bookings retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserBookingsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /bookings/{id}:
    get:
      tags:
        - Bookings
      summary: Get booking details
      description: |
        Retrieve detailed information about a specific booking.
        Users can only access their own bookings; admins can access all bookings.
      operationId: getBooking
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Booking details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /bookings/{id}/cancel:
    put:
      tags:
        - Bookings
      summary: Cancel booking
      description: |
        Cancel an existing booking. Uses stored procedure for transaction safety.
        Business rules:
        - Can only cancel up to 2 hours before show time
        - Refund amount calculated based on cancellation policy
        - Seat availability automatically updated
      operationId: cancelBooking
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Booking cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelBookingResponse'
        '400':
          description: Booking cannot be cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  code: "CANCELLATION_NOT_ALLOWED"
                  message: "Booking cannot be cancelled within 2 hours of show time"
                  path: "/api/bookings/123/cancel"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Booking already cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login endpoint

  parameters:
    MovieId:
      name: id
      in: path
      required: true
      description: Movie ID
      schema:
        type: integer
        minimum: 1

    TheatreId:
      name: id
      in: path
      required: true
      description: Theatre ID
      schema:
        type: integer
        minimum: 1

    ShowId:
      name: id
      in: path
      required: true
      description: Show ID
      schema:
        type: integer
        minimum: 1

    BookingId:
      name: id
      in: path
      required: true
      description: Booking ID
      schema:
        type: integer
        minimum: 1

    GenreFilter:
      name: genre
      in: query
      description: Filter by genre
      schema:
        $ref: '#/components/schemas/Genre'

    LanguageFilter:
      name: language
      in: query
      description: Filter by language
      schema:
        type: string
        minLength: 2
        maxLength: 50

    RatingFilter:
      name: rating
      in: query
      description: Filter by rating
      schema:
        $ref: '#/components/schemas/Rating'

    Limit:
      name: limit
      in: query
      description: Number of items to return
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    Offset:
      name: offset
      in: query
      description: Number of items to skip
      schema:
        type: integer
        minimum: 0
        default: 0

    Page:
      name: page
      in: query
      description: Page number
      schema:
        type: integer
        minimum: 1
        default: 1

  schemas:
    # Authentication Schemas
    UserRegistration:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          pattern: '^[a-zA-Z0-9_]+$'
          description: Alphanumeric characters and underscores only
        email:
          type: string
          format: email
          description: Valid email address
        password:
          type: string
          minLength: 8
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).*$'
          description: Must contain uppercase, lowercase, and digit
      example:
        username: "john_doe"
        email: "john@example.com"
        password: "SecurePass123"

    UserLogin:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      example:
        email: "john@example.com"
        password: "SecurePass123"

    User:
      type: object
      properties:
        id:
          type: integer
          description: User ID
        username:
          type: string
          description: Username
        email:
          type: string
          format: email
          description: User email
        role:
          type: string
          enum: [USER, ADMIN]
          description: User role
        created_at:
          type: string
          format: date-time
          description: Account creation timestamp

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            token:
              type: string
              description: JWT token for authentication
        message:
          type: string
          example: "Login successful"
        meta:
          $ref: '#/components/schemas/MetaData'

    # Movie Schemas
    Genre:
      type: string
      enum:
        - ACTION
        - COMEDY
        - DRAMA
        - HORROR
        - ROMANCE
        - SCI_FI
        - THRILLER
        - DOCUMENTARY
        - ANIMATION
        - OTHER

    Rating:
      type: string
      enum:
        - G
        - PG
        - PG-13
        - R
        - NC-17
        - NR

    Movie:
      type: object
      properties:
        id:
          type: integer
          description: Movie ID
        title:
          type: string
          description: Movie title
        description:
          type: string
          description: Movie description
        genre:
          $ref: '#/components/schemas/Genre'
        language:
          type: string
          description: Movie language
        duration_minutes:
          type: integer
          minimum: 1
          maximum: 500
          description: Movie duration in minutes
        release_date:
          type: string
          format: date
          description: Release date
        rating:
          $ref: '#/components/schemas/Rating'
        poster_url:
          type: string
          format: uri
          description: Poster image URL
        is_active:
          type: boolean
          description: Whether movie is active
        created_at:
          type: string
          format: date-time

    MovieInput:
      type: object
      required:
        - title
        - description
        - genre
        - language
        - duration_minutes
        - release_date
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          minLength: 1
        genre:
          $ref: '#/components/schemas/Genre'
        language:
          type: string
          minLength: 2
          maxLength: 50
        duration_minutes:
          type: integer
          minimum: 1
          maximum: 500
        release_date:
          type: string
          format: date
        rating:
          $ref: '#/components/schemas/Rating'
        poster_url:
          type: string
          format: uri

    MovieResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            movie:
              $ref: '#/components/schemas/Movie'
        message:
          type: string
        meta:
          $ref: '#/components/schemas/MetaData'

    MoviesResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            movies:
              type: array
              items:
                $ref: '#/components/schemas/Movie'
            pagination:
              $ref: '#/components/schemas/Pagination'
        message:
          type: string
        meta:
          $ref: '#/components/schemas/MetaData'

    # Theatre Schemas
    Theatre:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        location:
          type: string
        city:
          type: string
        state:
          type: string
        pincode:
          type: string
          pattern: '^[0-9]{6}$'
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    TheatreInput:
      type: object
      required:
        - name
        - location
        - city
        - state
        - pincode
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 255
        location:
          type: string
          minLength: 5
          maxLength: 255
        city:
          type: string
          minLength: 2
          maxLength: 100
        state:
          type: string
          minLength: 2
          maxLength: 100
        pincode:
          type: string
          pattern: '^[0-9]{6}$'

    Screen:
      type: object
      properties:
        id:
          type: integer
        screen_name:
          type: string
        total_seats:
          type: integer
        screen_type:
          type: string

    TheatreDetail:
      allOf:
        - $ref: '#/components/schemas/Theatre'
        - type: object
          properties:
            screens:
              type: array
              items:
                $ref: '#/components/schemas/Screen'

    TheatreResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            theatre:
              $ref: '#/components/schemas/Theatre'
        message:
          type: string
        meta:
          $ref: '#/components/schemas/MetaData'

    TheatreDetailResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            theatre:
              $ref: '#/components/schemas/TheatreDetail'
        message:
          type: string
        meta:
          $ref: '#/components/schemas/MetaData'

    TheatresResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            theatres:
              type: array
              items:
                $ref: '#/components/schemas/Theatre'
        message:
          type: string
        meta:
          $ref: '#/components/schemas/MetaData'

    # Show Schemas
    Show:
      type: object
      properties:
        id:
          type: integer
        movie_id:
          type: integer
        screen_id:
          type: integer
        show_time:
          type: string
          format: date-time
        price:
          type: number
          format: decimal
          multipleOf: 0.01
        is_active:
          type: boolean
        movie:
          type: object
          properties:
            title:
              type: string
            duration_minutes:
              type: integer
        theatre:
          type: object
          properties:
            name:
              type: string
            location:
              type: string
        screen:
          type: object
          properties:
            screen_name:
              type: string

    ShowInput:
      type: object
      required:
        - movie_id
        - screen_id
        - show_time
        - price
      properties:
        movie_id:
          type: integer
          minimum: 1
        screen_id:
          type: integer
          minimum: 1
        show_time:
          type: string
          format: date-time
        price:
          type: number
          format: decimal
          minimum: 0.01
          multipleOf: 0.01

    ShowDetail:
      type: object
      properties:
        id:
          type: integer
        movie_id:
          type: integer
        screen_id:
          type: integer
        show_time:
          type: string
          format: date-time
        price:
          type: number
          format: decimal
        is_active:
          type: boolean
        movie:
          $ref: '#/components/schemas/Movie'
        theatre:
          $ref: '#/components/schemas/Theatre'
        screen:
          $ref: '#/components/schemas/Screen'

    ShowResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            show:
              $ref: '#/components/schemas/Show'
        message:
          type: string
        meta:
          $ref: '#/components/schemas/MetaData'

    ShowDetailResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            show:
              $ref: '#/components/schemas/ShowDetail'
        message:
          type: string
        meta:
          $ref: '#/components/schemas/MetaData'

    ShowsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            shows:
              type: array
              items:
                $ref: '#/components/schemas/Show'
        message:
          type: string
        meta:
          $ref: '#/components/schemas/MetaData'

    # Seat Schemas
    Seat:
      type: object
      properties:
        seat_id:
          type: integer
        seat_number:
          type: string
        seat_type:
          type: string
          enum:
            - REGULAR
            - PREMIUM
            - VIP
            - RECLINER
        is_available:
          type: boolean

    SeatSummary:
      type: object
      properties:
        total_seats:
          type: integer
        available_seats:
          type: integer
        booked_seats:
          type: integer

    SeatAvailabilityResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            show:
              type: object
              properties:
                id:
                  type: integer
                show_time:
                  type: string
                  format: date-time
                price:
                  type: number
                  format: decimal
            seats:
              type: array
              items:
                $ref: '#/components/schemas/Seat'
            summary:
              $ref: '#/components/schemas/SeatSummary'
        message:
          type: string
        meta:
          $ref: '#/components/schemas/MetaData'

    # Booking Schemas
    BookingStatus:
      type: string
      enum:
        - CONFIRMED
        - CANCELLED

    PaymentMethod:
      type: string
      enum:
        - CREDIT_CARD
        - DEBIT_CARD
        - UPI
        - NET_BANKING

    PaymentStatus:
      type: string
      enum:
        - PENDING
        - SUCCESS
        - FAILED
        - REFUNDED

    BookingInput:
      type: object
      required:
        - showId
        - seatIds
        - paymentMethod
      properties:
        showId:
          type: integer
          minimum: 1
          description: ID of the show to book
        seatIds:
          type: array
          minItems: 1
          maxItems: 10
          items:
            type: integer
            minimum: 1
          description: Array of seat IDs to book
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'

    BookingSeat:
      type: object
      properties:
        seat_number:
          type: string
        seat_type:
          type: string

    Payment:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: number
          format: decimal
        payment_method:
          $ref: '#/components/schemas/PaymentMethod'
        payment_status:
          $ref: '#/components/schemas/PaymentStatus'
        transaction_id:
          type: string
        payment_time:
          type: string
          format: date-time

    Booking:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        show_id:
          type: integer
        booking_time:
          type: string
          format: date-time
        total_amount:
          type: number
          format: decimal
        status:
          $ref: '#/components/schemas/BookingStatus'
        show:
          type: object
          properties:
            movie_title:
              type: string
            show_time:
              type: string
              format: date-time
            theatre_name:
              type: string
        seats:
          type: array
          items:
            $ref: '#/components/schemas/BookingSeat'
        payment:
          $ref: '#/components/schemas/Payment'

    BookingDetail:
      allOf:
        - $ref: '#/components/schemas/Booking'
        - type: object
          properties:
            user:
              type: object
              properties:
                id:
                  type: integer
                username:
                  type: string
                email:
                  type: string

    UserBooking:
      type: object
      properties:
        id:
          type: integer
        show_id:
          type: integer
        booking_time:
          type: string
          format: date-time
        total_amount:
          type: number
          format: decimal
        status:
          $ref: '#/components/schemas/BookingStatus'
        show:
          type: object
          properties:
            movie_title:
              type: string
            show_time:
              type: string
              format: date-time
            theatre_name:
              type: string
            screen_name:
              type: string
        seats_count:
          type: integer
        seats:
          type: array
          items:
            $ref: '#/components/schemas/BookingSeat'

    CancelledBooking:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
          enum: [CANCELLED]
        cancelled_at:
          type: string
          format: date-time
        refund_amount:
          type: number
          format: decimal
        cancellation_fee:
          type: number
          format: decimal

    BookingResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            booking:
              $ref: '#/components/schemas/Booking'
        message:
          type: string
        meta:
          $ref: '#/components/schemas/MetaData'

    BookingDetailResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            booking:
              $ref: '#/components/schemas/BookingDetail'
        message:
          type: string
        meta:
          $ref: '#/components/schemas/MetaData'

    BookingsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            bookings:
              type: array
              items:
                $ref: '#/components/schemas/Booking'
            pagination:
              $ref: '#/components/schemas/Pagination'
        message:
          type: string
        meta:
          $ref: '#/components/schemas/MetaData'

    UserBookingsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            bookings:
              type: array
              items:
                $ref: '#/components/schemas/UserBooking'
            pagination:
              $ref: '#/components/schemas/Pagination'
        message:
          type: string
        meta:
          $ref: '#/components/schemas/MetaData'

    CancelBookingResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            booking:
              $ref: '#/components/schemas/CancelledBooking'
        message:
          type: string
        meta:
          $ref: '#/components/schemas/MetaData'

    # Utility Schemas
    MetaData:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        api_version:
          type: string
          example: "1.0"

    Pagination:
      type: object
      properties:
        total:
          type: integer
          description: Total number of items
        page:
          type: integer
          description: Current page number
        limit:
          type: integer
          description: Items per page
        hasNext:
          type: boolean
          description: Whether there's a next page
        hasPrev:
          type: boolean
          description: Whether there's a previous page

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          nullable: true
        message:
          type: string
        meta:
          $ref: '#/components/schemas/MetaData'

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              description: Error code
            message:
              type: string
              description: Human readable error message
            details:
              type: array
              items:
                type: string
              description: Additional error details
            path:
              type: string
              description: API endpoint path
        meta:
          $ref: '#/components/schemas/MetaData'

  responses:
    BadRequest:
      description: Bad Request - Invalid request data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: "VALIDATION_ERROR"
              message: "Request validation failed"
              details: ["Invalid email format"]
              path: "/api/auth/register"

    Unauthorized:
      description: Unauthorized - Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: "AUTHENTICATION_ERROR"
              message: "Authentication required"
              path: "/api/bookings"

    Forbidden:
      description: Forbidden - Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: "AUTHORIZATION_ERROR"
              message: "Admin access required"
              path: "/api/movies"

    NotFound:
      description: Not Found - Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: "RESOURCE_NOT_FOUND"
              message: "Movie not found"
              path: "/api/movies/999"

    Conflict:
      description: Conflict - Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: "DUPLICATE_ENTRY"
              message: "Email already exists"
              path: "/api/auth/register"

    ValidationError:
      description: Validation Error - Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: "VALIDATION_ERROR"
              message: "Validation failed"
              details: ["Password must contain uppercase letter"]
              path: "/api/auth/register"

security:
  - bearerAuth: []

tags:
  - name: Authentication
    description: User registration and authentication
  - name: Movies
    description: Movie catalog management
  - name: Theatres
    description: Theatre and screen management
  - name: Shows
    description: Show scheduling and seat availability
  - name: Bookings
    description: Ticket booking and management (CRITICAL)