<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Ticket Booking</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <h1 class="logo">🎬 MovieBooking</h1>
            <nav class="nav">
                <a href="index.html" class="nav-link active">Movies</a>
                <a href="pages/booking.html" class="nav-link">My Bookings</a>
                <div id="authNav">
                    <a href="pages/login.html" class="nav-link" id="loginLink">Login</a>
                    <span class="user-info" id="userInfo" style="display: none;">
                        <span id="username"></span>
                        <button id="logoutBtn" class="btn-secondary">Logout</button>
                    </span>
                </div>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- Movies Section -->
            <section class="movies-section">
                <div class="section-header">
                    <h2>Now Showing</h2>
                    <div class="filters">
                        <select id="genreFilter" class="filter-select">
                            <option value="">All Genres</option>
                            <option value="ACTION">Action</option>
                            <option value="COMEDY">Comedy</option>
                            <option value="DRAMA">Drama</option>
                            <option value="HORROR">Horror</option>
                            <option value="ROMANCE">Romance</option>
                            <option value="SCI_FI">Sci-Fi</option>
                            <option value="THRILLER">Thriller</option>
                            <option value="ANIMATION">Animation</option>
                        </select>
                        <select id="languageFilter" class="filter-select">
                            <option value="">All Languages</option>
                            <option value="English">English</option>
                            <option value="Hindi">Hindi</option>
                            <option value="Telugu">Telugu</option>
                            <option value="Tamil">Tamil</option>
                        </select>
                    </div>
                </div>

                <!-- Loading Indicator -->
                <div id="loadingMovies" class="loading">
                    <div class="spinner"></div>
                    <p>Loading movies...</p>
                </div>

                <!-- Movies Grid -->
                <div id="moviesGrid" class="movies-grid">
                    <!-- Movies will be dynamically loaded here -->
                </div>

                <!-- Error Message -->
                <div id="moviesError" class="error-message" style="display: none;">
                    <p>Failed to load movies. Please try again later.</p>
                    <button onclick="loadMovies()" class="btn-primary">Retry</button>
                </div>
            </section>

            <!-- Movie Details Modal -->
            <div id="movieModal" class="modal" style="display: none;">
                <div class="modal-content">
                    <span class="close" onclick="closeMovieModal()">&times;</span>
                    <div id="movieDetails">
                        <!-- Movie details will be loaded here -->
                    </div>
                </div>
            </div>

            <!-- Show Selection Modal -->
            <div id="showModal" class="modal" style="display: none;">
                <div class="modal-content">
                    <span class="close" onclick="closeShowModal()">&times;</span>
                    <div id="showSelection">
                        <h3>Select Show Time</h3>
                        <div id="showsList">
                            <!-- Shows will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Seat Selection Modal -->
            <div id="seatModal" class="modal" style="display: none;">
                <div class="modal-content large">
                    <span class="close" onclick="closeSeatModal()">&times;</span>
                    <div id="seatSelection">
                        <h3>Select Seats</h3>
                        <div class="seat-info">
                            <div class="seat-legend">
                                <div class="legend-item">
                                    <div class="seat available"></div>
                                    <span>Available</span>
                                </div>
                                <div class="legend-item">
                                    <div class="seat selected"></div>
                                    <span>Selected</span>
                                </div>
                                <div class="legend-item">
                                    <div class="seat booked"></div>
                                    <span>Booked</span>
                                </div>
                            </div>
                        </div>
                        <div class="screen">SCREEN</div>
                        <div id="seatMap">
                            <!-- Seat map will be generated here -->
                        </div>
                        <div class="booking-summary">
                            <div id="selectedSeats">No seats selected</div>
                            <div id="totalAmount">Total: ₹0</div>
                            <button id="proceedBooking" class="btn-primary" disabled onclick="proceedToBooking()">
                                Proceed to Book
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Booking Confirmation Modal -->
            <div id="bookingModal" class="modal" style="display: none;">
                <div class="modal-content">
                    <span class="close" onclick="closeBookingModal()">&times;</span>
                    <div id="bookingForm">
                        <h3>Confirm Booking</h3>
                        <div class="booking-details">
                            <div id="bookingSummary">
                                <!-- Booking summary will be displayed here -->
                            </div>
                            <form id="confirmBookingForm">
                                <div class="form-group">
                                    <label for="paymentMethod">Payment Method</label>
                                    <select id="paymentMethod" name="paymentMethod" required>
                                        <option value="">Select Payment Method</option>
                                        <option value="CARD">Credit/Debit Card</option>
                                        <option value="UPI">UPI</option>
                                        <option value="WALLET">Digital Wallet</option>
                                        <option value="CASH">Cash</option>
                                    </select>
                                </div>
                                <div class="form-actions">
                                    <button type="button" onclick="closeBookingModal()" class="btn-secondary">Cancel</button>
                                    <button type="submit" class="btn-primary">Confirm Booking</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast" style="display: none;">
        <span id="toastMessage"></span>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
