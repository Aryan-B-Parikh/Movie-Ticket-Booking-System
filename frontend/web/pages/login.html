<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Movie Ticket Booking</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .auth-card {
            background: white;
            border-radius: 8px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            color: #333;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e1e1e1;
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group.error input {
            border-color: #dc3545;
        }

        .error-message {
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        .auth-button {
            width: 100%;
            padding: 0.75rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .auth-button:hover:not(:disabled) {
            background: #5a6fd8;
        }

        .auth-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .auth-switch {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e1e1e1;
        }

        .auth-switch a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-switch a:hover {
            text-decoration: underline;
        }

        .back-link {
            text-align: center;
            margin-top: 1rem;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 1rem;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 0.75rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🎬 MovieBooking</h1>
                <p>Login to your account</p>
            </div>

            <div id="successMessage" class="success-message" style="display: none;">
                Registration successful! Please login with your credentials.
            </div>

            <div id="errorMessage" class="error-message" style="display: none; text-align: center; margin-bottom: 1rem; padding: 0.75rem; background: #f8d7da; border: 1px solid #f5c6cb; border-radius: 4px;">
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                    <div class="error-message" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                    <div class="error-message" id="passwordError"></div>
                </div>

                <button type="submit" class="auth-button" id="loginButton">
                    Login
                </button>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Logging in...</p>
                </div>
            </form>

            <!-- Registration Form (hidden by default) -->
            <form id="registerForm" style="display: none;">
                <div class="form-group">
                    <label for="regUsername">Username</label>
                    <input type="text" id="regUsername" name="username" minlength="3" maxlength="50" pattern="[a-zA-Z0-9_]+" required>
                    <div class="error-message" id="regUsernameError"></div>
                </div>

                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" name="email" required>
                    <div class="error-message" id="regEmailError"></div>
                </div>

                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" name="password" minlength="8" required>
                    <div class="error-message" id="regPasswordError"></div>
                    <small style="color: #666; font-size: 0.8rem;">Must contain at least one uppercase letter, one lowercase letter, and one number</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                    <div class="error-message" id="confirmPasswordError"></div>
                </div>

                <button type="submit" class="auth-button" id="registerButton">
                    Register
                </button>

                <div class="loading" id="registerLoading">
                    <div class="spinner"></div>
                    <p>Creating account...</p>
                </div>
            </form>

            <div class="auth-switch">
                <p id="switchText">Don't have an account? <a href="#" id="switchLink">Register here</a></p>
            </div>

            <div class="back-link">
                <a href="../index.html">← Back to Movies</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/api.js"></script>
    <script>
        let isLoginMode = true;

        document.addEventListener('DOMContentLoaded', function() {
            // Check if user is already logged in
            if (api.isAuthenticated() && !api.isTokenExpired()) {
                window.location.href = '../index.html';
                return;
            }

            // Check for success message from registration
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('registered') === 'true') {
                showSuccessMessage();
            }

            attachEventListeners();
        });

        function attachEventListeners() {
            // Form submissions
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('registerForm').addEventListener('submit', handleRegister);

            // Mode switching
            document.getElementById('switchLink').addEventListener('click', toggleMode);

            // Real-time validation
            document.getElementById('regPassword').addEventListener('input', validatePassword);
            document.getElementById('confirmPassword').addEventListener('input', validateConfirmPassword);
            document.getElementById('regUsername').addEventListener('input', validateUsername);
        }

        async function handleLogin(event) {
            event.preventDefault();

            const form = event.target;
            const formData = new FormData(form);
            const credentials = {
                email: formData.get('email'),
                password: formData.get('password')
            };

            // Clear previous errors
            clearErrors();

            // Show loading state
            setLoadingState(true);

            try {
                const response = await api.login(credentials);

                showToast('Login successful!', 'success');

                // Redirect to main page
                setTimeout(() => {
                    window.location.href = '../index.html';
                }, 1000);

            } catch (error) {
                console.error('Login failed:', error);
                showError(error.message || 'Login failed. Please check your credentials.');
            } finally {
                setLoadingState(false);
            }
        }

        async function handleRegister(event) {
            event.preventDefault();

            const form = event.target;
            const formData = new FormData(form);

            const userData = {
                username: formData.get('username'),
                email: formData.get('email'),
                password: formData.get('password')
            };

            const confirmPassword = formData.get('confirmPassword');

            // Validate form
            if (!validateForm(userData, confirmPassword)) {
                return;
            }

            // Clear previous errors
            clearErrors();

            // Show loading state
            setRegisterLoadingState(true);

            try {
                await api.register(userData);

                showToast('Registration successful! Please login.', 'success');

                // Switch to login mode
                toggleMode();
                showSuccessMessage();

            } catch (error) {
                console.error('Registration failed:', error);
                showError(error.message || 'Registration failed. Please try again.');
            } finally {
                setRegisterLoadingState(false);
            }
        }

        function validateForm(userData, confirmPassword) {
            let isValid = true;

            // Username validation
            if (!validateUsername()) {
                isValid = false;
            }

            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(userData.email)) {
                showFieldError('regEmailError', 'Please enter a valid email address');
                isValid = false;
            }

            // Password validation
            if (!validatePassword()) {
                isValid = false;
            }

            // Confirm password validation
            if (!validateConfirmPassword()) {
                isValid = false;
            }

            return isValid;
        }

        function validateUsername() {
            const username = document.getElementById('regUsername').value;
            const usernameRegex = /^[a-zA-Z0-9_]+$/;

            if (username.length < 3 || username.length > 50) {
                showFieldError('regUsernameError', 'Username must be between 3 and 50 characters');
                return false;
            }

            if (!usernameRegex.test(username)) {
                showFieldError('regUsernameError', 'Username can only contain letters, numbers, and underscores');
                return false;
            }

            clearFieldError('regUsernameError');
            return true;
        }

        function validatePassword() {
            const password = document.getElementById('regPassword').value;
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/;

            if (password.length < 8) {
                showFieldError('regPasswordError', 'Password must be at least 8 characters long');
                return false;
            }

            if (!passwordRegex.test(password)) {
                showFieldError('regPasswordError', 'Password must contain at least one uppercase letter, one lowercase letter, and one number');
                return false;
            }

            clearFieldError('regPasswordError');
            return true;
        }

        function validateConfirmPassword() {
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showFieldError('confirmPasswordError', 'Passwords do not match');
                return false;
            }

            clearFieldError('confirmPasswordError');
            return true;
        }

        function showFieldError(fieldId, message) {
            const errorElement = document.getElementById(fieldId);
            const inputElement = errorElement.previousElementSibling;

            errorElement.textContent = message;
            inputElement.closest('.form-group').classList.add('error');
        }

        function clearFieldError(fieldId) {
            const errorElement = document.getElementById(fieldId);
            const inputElement = errorElement.previousElementSibling;

            errorElement.textContent = '';
            inputElement.closest('.form-group').classList.remove('error');
        }

        function toggleMode() {
            isLoginMode = !isLoginMode;

            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const switchText = document.getElementById('switchText');
            const switchLink = document.getElementById('switchLink');
            const authHeader = document.querySelector('.auth-header p');

            if (isLoginMode) {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                authHeader.textContent = 'Login to your account';
                switchText.innerHTML = 'Don\'t have an account? <a href="#" id="switchLink">Register here</a>';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                authHeader.textContent = 'Create your account';
                switchText.innerHTML = 'Already have an account? <a href="#" id="switchLink">Login here</a>';
            }

            // Reattach event listener for the new switch link
            document.getElementById('switchLink').addEventListener('click', toggleMode);

            // Clear errors and success messages
            clearErrors();
            hideSuccessMessage();
        }

        function setLoadingState(loading) {
            const loginButton = document.getElementById('loginButton');
            const loadingElement = document.getElementById('loading');

            if (loading) {
                loginButton.disabled = true;
                loginButton.textContent = 'Logging in...';
                loadingElement.style.display = 'block';
            } else {
                loginButton.disabled = false;
                loginButton.textContent = 'Login';
                loadingElement.style.display = 'none';
            }
        }

        function setRegisterLoadingState(loading) {
            const registerButton = document.getElementById('registerButton');
            const loadingElement = document.getElementById('registerLoading');

            if (loading) {
                registerButton.disabled = true;
                registerButton.textContent = 'Creating Account...';
                loadingElement.style.display = 'block';
            } else {
                registerButton.disabled = false;
                registerButton.textContent = 'Register';
                loadingElement.style.display = 'none';
            }
        }

        function showError(message) {
            const errorElement = document.getElementById('errorMessage');
            errorElement.textContent = message;
            errorElement.style.display = 'block';
        }

        function clearErrors() {
            const errorElement = document.getElementById('errorMessage');
            errorElement.style.display = 'none';

            // Clear field errors
            const fieldErrors = document.querySelectorAll('.error-message');
            fieldErrors.forEach(error => {
                error.textContent = '';
            });

            // Remove error classes
            const errorGroups = document.querySelectorAll('.form-group.error');
            errorGroups.forEach(group => {
                group.classList.remove('error');
            });
        }

        function showSuccessMessage() {
            const successElement = document.getElementById('successMessage');
            successElement.style.display = 'block';
        }

        function hideSuccessMessage() {
            const successElement = document.getElementById('successMessage');
            successElement.style.display = 'none';
        }
    </script>
</body>
</html>
